<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тихая Гавань — Рыбалка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#F2A65A;
    --sky-bottom:#1E5A6B;
    --water-deep:#0B2F3A;
    --water-mid:#144B57;
    --gold:#F2C14E;
    --coral:#E8734A;
    --cream:#F5EFE3;
    --ink:#08222A;
    --card:#0F3A46;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:var(--water-deep); color:var(--cream);}
  #stage{
    position:relative; width:100%; height:100vh; overflow:hidden;
    background:linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 32%, var(--water-mid) 33%, var(--water-deep) 100%);
  }
  .sun{
    position:absolute; top:6%; left:50%; transform:translateX(-50%);
    width:70px; height:70px; border-radius:50%;
    background:radial-gradient(circle, #FFE7B0, var(--gold) 70%);
    box-shadow:0 0 40px 10px rgba(242,193,78,0.5);
  }
  .hills{position:absolute; top:26%; width:100%; height:14%; opacity:.55;}
  .hills svg{width:100%; height:100%;}

  .ripple-layer{position:absolute; top:33%; left:0; width:100%; height:67%; overflow:hidden;}
  .wave{
    position:absolute; width:220%; left:-60%;
    background:rgba(245,239,227,0.05);
    border-radius:50%;
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{transform:translateX(0);}
    100%{transform:translateX(30%);}
  }

  #topbar{
    position:absolute; top:0; left:0; width:100%; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center; z-index:5;
  }
  .pill{
    background:rgba(8,34,42,0.55); backdrop-filter:blur(4px);
    border:1px solid rgba(245,239,227,0.25);
    border-radius:999px; padding:6px 14px; font-weight:800; font-size:14px;
    display:flex; align-items:center; gap:6px;
  }
  .pill span.ico{font-size:15px;}

  .title{
    position:absolute; top:14%; left:0; width:100%; text-align:center; z-index:4;
  }
  .title h1{
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:22px; margin:0;
    color:var(--cream); text-shadow:0 2px 8px rgba(0,0,0,0.35); letter-spacing:.5px;
  }
  .title p{margin:2px 0 0; font-size:12px; opacity:.85; font-weight:600;}

  /* rod & line */
  #rodwrap{
    position:absolute; left:50%; top:31%; transform:translateX(-50%);
    width:6px; height:110px; z-index:3; transform-origin:top center;
  }
  #line{
    position:absolute; left:2px; top:0; width:2px; background:rgba(245,239,227,0.8);
    transform-origin:top center;
  }
  #bobber{
    position:absolute; left:50%; width:26px; height:26px; transform:translate(-50%,-50%);
    z-index:3;
  }
  #bobber .body{
    width:100%; height:100%; border-radius:50%;
    background:linear-gradient(180deg, var(--coral) 50%, var(--cream) 50%);
    border:2px solid var(--ink); box-shadow:0 3px 6px rgba(0,0,0,0.4);
  }
  #bobber.hidden{display:none;}

  #splash{
    position:absolute; width:60px; height:60px; transform:translate(-50%,-50%);
    border:3px solid rgba(245,239,227,0.75); border-radius:50%;
    opacity:0; pointer-events:none; z-index:3;
  }
  #splash.animate{animation:splash .5s ease-out;}
  @keyframes splash{
    0%{opacity:.9; width:10px; height:10px;}
    100%{opacity:0; width:90px; height:90px;}
  }

  #bitebang{
    position:absolute; transform:translate(-50%,-140%); z-index:6;
    font-size:30px; opacity:0; pointer-events:none;
  }
  #bitebang.show{animation:pop .55s ease-out;}
  @keyframes pop{
    0%{opacity:0; transform:translate(-50%,-100%) scale(.4);}
    30%{opacity:1; transform:translate(-50%,-160%) scale(1.15);}
    100%{opacity:0; transform:translate(-50%,-190%) scale(1);}
  }

  #bottompanel{
    position:absolute; left:0; bottom:0; width:100%; z-index:5;
    padding:16px 16px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(6,20,25,0.92), rgba(6,20,25,0));
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  #status{
    font-weight:700; font-size:14px; min-height:18px; opacity:.9; text-align:center;
  }
  #mainbtn{
    width:100%; max-width:340px; padding:16px 0; border:none; border-radius:18px;
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size:19px;
    background:linear-gradient(180deg, var(--gold), #D89A2E);
    color:var(--ink); box-shadow:0 6px 0 #8A6318, 0 8px 16px rgba(0,0,0,0.35);
    transition:transform .08s ease;
  }
  #mainbtn:active{transform:translateY(4px); box-shadow:0 2px 0 #8A6318;}
  #mainbtn.pull{
    background:linear-gradient(180deg, var(--coral), #B5502A);
    box-shadow:0 6px 0 #7A331A, 0 8px 16px rgba(0,0,0,0.35);
  }
  #mainbtn:disabled{opacity:.55;}

  #timerbar{
    width:100%; max-width:340px; height:8px; border-radius:6px;
    background:rgba(245,239,227,0.2); overflow:hidden; display:none;
  }
  #timerfill{height:100%; width:100%; background:var(--coral); transform-origin:left;}

  /* catch card */
  #catchcard{
    position:absolute; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center;
    background:rgba(6,20,25,0.72); backdrop-filter:blur(2px);
  }
  #catchcard .card{
    width:82%; max-width:320px; background:var(--card); border-radius:22px;
    padding:26px 20px 22px; text-align:center; border:1px solid rgba(245,239,227,0.15);
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
  }
  #catchcard .fishico{font-size:56px; display:block; margin-bottom:6px;}
  #catchcard h2{font-family:'Baloo 2',sans-serif; font-size:22px; margin:2px 0 2px;}
  #catchcard .rarity{font-size:12px; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px;}
  #catchcard .reward{font-weight:700; font-size:15px; margin-bottom:16px; opacity:.9;}
  #catchcard button{
    border:none; border-radius:14px; padding:12px 26px; font-weight:800; font-size:15px;
    background:var(--gold); color:var(--ink); font-family:'Baloo 2',sans-serif;
  }

  .r-common{color:#BFD9CE;}
  .r-uncommon{color:#7FD68A;}
  .r-rare{color:#5AB0E8;}
  .r-legendary{color:#F2C14E;}
</style>
</head>
<body>

<div id="stage">
  <div class="sun"></div>
  <div class="hills">
    <svg viewBox="0 0 400 60" preserveAspectRatio="none"><path d="M0,60 Q100,10 200,40 T400,20 V60 Z" fill="#0B2F3A"/></svg>
  </div>
  <div class="ripple-layer">
    <div class="wave" style="top:10%; height:40px; animation-duration:9s;"></div>
    <div class="wave" style="top:35%; height:60px; animation-duration:13s;"></div>
    <div class="wave" style="top:65%; height:50px; animation-duration:11s;"></div>
  </div>

  <div id="topbar">
    <div class="pill"><span class="ico">🪙</span><span id="coinsVal">0</span></div>
    <div class="pill"><span class="ico">🐟</span><span id="catchVal">0</span></div>
  </div>

  <div class="title">
    <h1>Тихая Гавань</h1>
    <p id="subtitle">Закинь удочку и жди клёва</p>
  </div>

  <div id="rodwrap">
    <div id="line"></div>
  </div>
  <div id="bobber" class="hidden"><div class="body"></div></div>
  <div id="splash"></div>
  <div id="bitebang">💥</div>

  <div id="bottompanel">
    <div id="status">Готов начать</div>
    <div id="timerbar"><div id="timerfill"></div></div>
    <button id="mainbtn">Закинуть удочку</button>
  </div>

  <div id="catchcard">
    <div class="card">
      <span class="fishico" id="cc-ico">🐠</span>
      <h2 id="cc-name">Окунь</h2>
      <div class="rarity" id="cc-rarity">обычная</div>
      <div class="reward" id="cc-reward">+10 монет</div>
      <button id="cc-close">Отлично!</button>
    </div>
  </div>
</div>

<script>
(function(){
  const tg = window.Telegram && window.Telegram.WebApp;
  if(tg){
    try{
      tg.ready();
      tg.expand();
      tg.setHeaderColor && tg.setHeaderColor('#0B2F3A');
      tg.setBackgroundColor && tg.setBackgroundColor('#0B2F3A');
    }catch(e){}
  }
  function haptic(type){
    if(tg && tg.HapticFeedback){
      if(type==='success') tg.HapticFeedback.notificationOccurred('success');
      else if(type==='error') tg.HapticFeedback.notificationOccurred('error');
      else tg.HapticFeedback.impactOccurred('light');
    }
  }

  const FISH = [
    {name:'Плотвичка', ico:'🐟', rarity:'common', label:'обычная', cls:'r-common', coins:[5,10]},
    {name:'Окунь',     ico:'🐠', rarity:'common', label:'обычная', cls:'r-common', coins:[8,14]},
    {name:'Карась',    ico:'🐡', rarity:'uncommon', label:'редкая', cls:'r-uncommon', coins:[15,25]},
    {name:'Щука',      ico:'🦈', rarity:'rare', label:'ценная', cls:'r-rare', coins:[30,50]},
    {name:'Золотая рыбка', ico:'✨', rarity:'legendary', label:'легендарная', cls:'r-legendary', coins:[80,120]},
  ];
  const WEIGHTS = [40, 30, 18, 9, 3];

  function pickFish(){
    const total = WEIGHTS.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    for(let i=0;i<WEIGHTS.length;i++){
      if(r < WEIGHTS[i]) return FISH[i];
      r -= WEIGHTS[i];
    }
    return FISH[0];
  }

  let coins = 0, catches = 0;
  let state = 'idle'; // idle -> casting -> waiting -> biting -> idle
  let biteTimeout, windowTimeout, currentFish = null;

  const btn = document.getElementById('mainbtn');
  const status = document.getElementById('status');
  const bobber = document.getElementById('bobber');
  const splash = document.getElementById('splash');
  const biteBang = document.getElementById('bitebang');
  const timerbar = document.getElementById('timerbar');
  const timerfill = document.getElementById('timerfill');
  const coinsVal = document.getElementById('coinsVal');
  const catchVal = document.getElementById('catchVal');
  const catchcard = document.getElementById('catchcard');

  const stageW = () => document.getElementById('stage').clientWidth;

  function setCoins(v){ coins = v; coinsVal.textContent = coins; }
  function setCatches(v){ catches = v; catchVal.textContent = catches; }

  function resetVisual(){
    bobber.classList.add('hidden');
    btn.classList.remove('pull');
    btn.disabled = false;
    timerbar.style.display = 'none';
    status.textContent = 'Готов начать';
    btn.textContent = 'Закинуть удочку';
  }

  function cast(){
    if(state !== 'idle') return;
    state = 'casting';
    btn.disabled = true;
    status.textContent = 'Закидываем...';
    haptic('light');

    const cx = stageW()/2;
    const cy = window.innerHeight * 0.31 + 60 + Math.random()*40;
    bobber.style.left = cx + 'px';
    bobber.style.top = cy + 'px';
    bobber.classList.remove('hidden');

    setTimeout(()=>{
      state = 'waiting';
      status.textContent = 'Тихо... жди клёва';
      btn.disabled = true;

      const delay = 1400 + Math.random()*2600;
      biteTimeout = setTimeout(triggerBite, delay);
    }, 350);
  }

  function triggerBite(){
    if(state !== 'waiting') return;
    state = 'biting';
    currentFish = pickFish();
    haptic('light');

    const rect = bobber.getBoundingClientRect();
    splash.style.left = rect.left + rect.width/2 + 'px';
    splash.style.top = rect.top + rect.height/2 + 'px';
    splash.classList.remove('animate');
    void splash.offsetWidth;
    splash.classList.add('animate');

    biteBang.style.left = rect.left + rect.width/2 + 'px';
    biteBang.style.top = rect.top + 'px';
    biteBang.classList.remove('show');
    void biteBang.offsetWidth;
    biteBang.classList.add('show');

    status.textContent = 'КЛЮЁТ! Тяни!';
    btn.textContent = 'Тяни!';
    btn.classList.add('pull');
    btn.disabled = false;

    timerbar.style.display = 'block';
    timerfill.style.transition = 'none';
    timerfill.style.width = '100%';
    requestAnimationFrame(()=>{
      timerfill.style.transition = `width 900ms linear`;
      timerfill.style.width = '0%';
    });

    windowTimeout = setTimeout(missedBite, 900);
  }

  function missedBite(){
    if(state !== 'biting') return;
    state = 'idle';
    haptic('error');
    status.textContent = 'Рыба сорвалась... Попробуй снова';
    setTimeout(resetVisual, 900);
  }

  function pull(){
    if(state !== 'biting') return;
    clearTimeout(windowTimeout);
    state = 'idle';
    haptic('success');

    const fish = currentFish;
    const reward = Math.floor(fish.coins[0] + Math.random()*(fish.coins[1]-fish.coins[0]));
    setCoins(coins + reward);
    setCatches(catches + 1);

    document.getElementById('cc-ico').textContent = fish.ico;
    document.getElementById('cc-name').textContent = fish.name;
    const rarityEl = document.getElementById('cc-rarity');
    rarityEl.textContent = fish.label;
    rarityEl.className = 'rarity ' + fish.cls;
    document.getElementById('cc-reward').textContent = '+' + reward + ' монет';
    catchcard.style.display = 'flex';

    resetVisual();
  }

  btn.addEventListener('click', ()=>{
    if(state === 'idle') cast();
    else if(state === 'biting') pull();
  });

  document.getElementById('cc-close').addEventListener('click', ()=>{
    catchcard.style.display = 'none';
  });

})();
</script>
</body>
</html>

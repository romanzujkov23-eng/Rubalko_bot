<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Тихая Гавань — Рыбалка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#F2C14E; --coral:#E8734A; --cream:#F5EFE3; --ink:#08222A; --card:#0F3A46; --water-deep:#0B2F3A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:var(--water-deep); color:var(--cream);}
  #app{position:relative; width:100%; height:100vh; overflow:hidden;}

  #screen-fish{position:absolute; inset:0; transition:background 0.6s ease;
    background:linear-gradient(to bottom, #F2A65A 0%, #1E5A6B 32%, #144B57 33%, var(--water-deep) 100%);}
  .sun{position:absolute; top:5%; left:50%; transform:translateX(-50%); width:56px; height:56px; border-radius:50%;
    background:radial-gradient(circle, #FFE7B0, var(--gold) 70%); box-shadow:0 0 40px 10px rgba(242,193,78,0.5);}
  .ripple-layer{position:absolute; top:33%; left:0; width:100%; height:50%; overflow:hidden;}
  .wave{position:absolute; width:220%; left:-60%; background:rgba(245,239,227,0.05); border-radius:50%; animation:drift linear infinite;}
  @keyframes drift{0%{transform:translateX(0);} 100%{transform:translateX(30%);}}

  #topbar{position:absolute; top:0; left:0; width:100%; padding:10px 12px; display:flex; justify-content:space-between; align-items:flex-start; z-index:5; gap:6px;}
  .pill{background:rgba(8,34,42,0.55); backdrop-filter:blur(4px); border:1px solid rgba(245,239,227,0.25);
    border-radius:999px; padding:5px 11px; font-weight:800; font-size:12px; display:flex; align-items:center; gap:5px;}
  #levelbox{background:rgba(8,34,42,0.55); border:1px solid rgba(245,239,227,0.25); border-radius:14px; padding:5px 11px 6px; min-width:100px;}
  #levelbox .lvltop{display:flex; justify-content:space-between; font-size:10px; font-weight:800; margin-bottom:3px;}
  #levelbox .xpbar{height:5px; border-radius:4px; background:rgba(245,239,227,0.2); overflow:hidden;}
  #levelbox .xpfill{height:100%; background:var(--gold); width:0%;}

  .title{position:absolute; top:10.5%; left:0; width:100%; text-align:center; z-index:4;}
  .title h1{font-family:'Baloo 2', sans-serif; font-weight:800; font-size:18px; margin:0; text-shadow:0 2px 8px rgba(0,0,0,0.35);}

  #locrow{position:absolute; top:16.5%; left:0; width:100%; z-index:4; display:flex; justify-content:center; gap:6px; padding:0 10px;}
  .locpill{border:1px solid rgba(245,239,227,0.3); border-radius:999px; padding:5px 11px; font-size:11px; font-weight:800;
    background:rgba(8,34,42,0.5); color:rgba(245,239,227,0.6);}
  .locpill.active{background:var(--gold); color:var(--ink); border-color:var(--gold);}
  .locpill.locked{opacity:.5;}

  #bonusbanner{position:absolute; top:21.5%; left:50%; transform:translateX(-50%); z-index:6; display:none;
    background:var(--gold); color:var(--ink); border-radius:14px; padding:8px 14px; font-weight:800; font-size:12px;
    display:none; align-items:center; gap:8px; box-shadow:0 6px 14px rgba(0,0,0,0.3);}
  #bonusbanner.show{display:flex;}
  #bonusbanner button{border:none; background:var(--ink); color:var(--cream); border-radius:10px; padding:5px 10px; font-weight:800; font-size:11px;}

  #rodwrap{position:absolute; left:50%; top:30%; transform:translateX(-50%); width:6px; height:95px; z-index:3;}
  #line{position:absolute; left:2px; top:0; width:2px; background:rgba(245,239,227,0.8);}
  #bobber{position:absolute; left:50%; width:24px; height:24px; transform:translate(-50%,-50%); z-index:3;}
  #bobber .body{width:100%; height:100%; border-radius:50%; background:linear-gradient(180deg, var(--coral) 50%, var(--cream) 50%);
    border:2px solid var(--ink); box-shadow:0 3px 6px rgba(0,0,0,0.4);}
  #bobber.hidden{display:none;}
  #splash{position:absolute; width:60px; height:60px; transform:translate(-50%,-50%); border:3px solid rgba(245,239,227,0.75);
    border-radius:50%; opacity:0; pointer-events:none; z-index:3;}
  #splash.animate{animation:splash .5s ease-out;}
  @keyframes splash{0%{opacity:.9; width:10px; height:10px;} 100%{opacity:0; width:90px; height:90px;}}
  #bitebang{position:absolute; transform:translate(-50%,-140%); z-index:6; font-size:26px; opacity:0; pointer-events:none;}
  #bitebang.show{animation:pop .55s ease-out;}
  @keyframes pop{0%{opacity:0; transform:translate(-50%,-100%) scale(.4);} 30%{opacity:1; transform:translate(-50%,-160%) scale(1.15);} 100%{opacity:0; transform:translate(-50%,-190%) scale(1);}}

  #bottompanel{position:absolute; left:0; bottom:64px; width:100%; z-index:5; padding:10px 16px 8px;
    background:linear-gradient(to top, rgba(6,20,25,0.92), rgba(6,20,25,0)); display:flex; flex-direction:column; align-items:center; gap:7px;}
  #status{font-weight:700; font-size:12px; min-height:15px; opacity:.9; text-align:center;}
  #mainbtn{width:100%; max-width:340px; padding:14px 0; border:none; border-radius:18px; font-family:'Baloo 2', sans-serif;
    font-weight:800; font-size:17px; background:linear-gradient(180deg, var(--gold), #D89A2E); color:var(--ink);
    box-shadow:0 6px 0 #8A6318, 0 8px 16px rgba(0,0,0,0.35); transition:transform .08s ease;}
  #mainbtn:active{transform:translateY(4px); box-shadow:0 2px 0 #8A6318;}
  #mainbtn.pull{background:linear-gradient(180deg, var(--coral), #B5502A); box-shadow:0 6px 0 #7A331A, 0 8px 16px rgba(0,0,0,0.35);}
  #mainbtn:disabled{opacity:.55;}
  #timerbar{width:100%; max-width:340px; height:7px; border-radius:6px; background:rgba(245,239,227,0.2); overflow:hidden; display:none;}
  #timerfill{height:100%; width:100%; background:var(--coral); transform-origin:left;}
  #gearline{font-size:10px; opacity:.75; font-weight:700; text-align:center;}

  #catchcard{position:absolute; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(6,20,25,0.72); backdrop-filter:blur(2px);}
  #catchcard .card{width:82%; max-width:320px; background:var(--card); border-radius:22px; padding:24px 20px 20px; text-align:center;
    border:1px solid rgba(245,239,227,0.15); box-shadow:0 20px 40px rgba(0,0,0,0.5);}
  #catchcard .fishico{font-size:50px; display:block; margin-bottom:6px;}
  #catchcard h2{font-family:'Baloo 2',sans-serif; font-size:20px; margin:2px 0 2px;}
  #catchcard .rarity{font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px;}
  #catchcard .xpline{font-weight:700; font-size:13px; margin-bottom:4px; opacity:.85;}
  #catchcard .hint{font-size:11px; opacity:.55; font-weight:600; margin-bottom:14px;}
  #catchcard button{border:none; border-radius:14px; padding:11px 24px; font-weight:800; font-size:14px;
    background:var(--gold); color:var(--ink); font-family:'Baloo 2',sans-serif;}

  .r0{color:#BFD9CE;} .r1{color:#BFD9CE;} .r2{color:#7FD68A;} .r3{color:#5AB0E8;} .r4{color:#F2C14E;}

  #navbar{position:absolute; left:0; bottom:0; width:100%; height:64px; z-index:10; display:flex;
    background:rgba(6,20,25,0.95); border-top:1px solid rgba(245,239,227,0.12); padding-bottom:env(safe-area-inset-bottom);}
  .navbtn{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    background:none; border:none; color:rgba(245,239,227,0.55); font-family:'Nunito',sans-serif; font-weight:800; font-size:9.5px;}
  .navbtn .navico{font-size:18px;}
  .navbtn.active{color:var(--gold);}

  .subscreen{position:absolute; inset:0 0 64px 0; z-index:8; background:var(--water-deep); display:none; flex-direction:column;}
  .subscreen.show{display:flex;}
  .subhead{padding:16px 16px 8px; flex-shrink:0;}
  .subhead h2{font-family:'Baloo 2',sans-serif; font-size:20px; margin:0 0 2px;}
  .subhead p{margin:0; font-size:11px; opacity:.7; font-weight:600;}
  .sublist{flex:1; overflow-y:auto; padding:6px 14px 20px; display:flex; flex-direction:column; gap:10px;}

  .card2{background:var(--card); border:1px solid rgba(245,239,227,0.12); border-radius:15px; padding:12px; display:flex; align-items:center; gap:10px;}
  .card2 .icobox{font-size:26px; width:38px; text-align:center; flex-shrink:0;}
  .card2 .info{flex:1; min-width:0;}
  .card2 .name{font-weight:800; font-size:14px; margin-bottom:1px;}
  .card2 .desc{font-size:10.5px; opacity:.65; font-weight:600;}
  .card2 .action{display:flex; flex-direction:column; gap:5px; flex-shrink:0;}
  .card2 button{border:none; border-radius:10px; padding:7px 11px; font-weight:800; font-size:11px; font-family:'Baloo 2',sans-serif; white-space:nowrap;}
  .btn-buy{background:var(--gold); color:var(--ink);}
  .btn-buy:disabled{background:rgba(245,239,227,0.15); color:rgba(245,239,227,0.4);}
  .btn-owned{background:rgba(127,214,138,0.2); color:#7FD68A;}
  .btn-active{background:var(--coral); color:var(--cream);}
  .btn-sell{background:var(--gold); color:var(--ink);}
  .btn-trade{background:#5AB0E8; color:var(--ink);}

  .sectiontitle{font-weight:800; font-size:12.5px; opacity:.7; margin:6px 0 -2px;}
  .locked{opacity:.35;}

  #sellall{margin:0 14px 4px; padding:12px; border:none; border-radius:14px; font-family:'Baloo 2',sans-serif;
    font-weight:800; font-size:14px; background:var(--gold); color:var(--ink);}

  .lbrow{display:flex; align-items:center; gap:10px; background:var(--card); border-radius:14px; padding:10px 12px; border:1px solid rgba(245,239,227,0.1);}
  .lbrow.me{border-color:var(--gold);}
  .lbrank{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:15px; width:26px; text-align:center; opacity:.8;}
  .lbname{flex:1; font-weight:700; font-size:13px;}
  .lbscore{font-weight:800; font-size:13px; color:var(--gold);}
  .lbnote{font-size:11px; opacity:.6; padding:0 4px 10px; font-weight:600; line-height:1.5;}
</style>
</head>
<body>

<div id="app">
  <div id="screen-fish">
    <div class="sun"></div>
    <div class="ripple-layer">
      <div class="wave" style="top:10%; height:40px; animation-duration:9s;"></div>
      <div class="wave" style="top:35%; height:60px; animation-duration:13s;"></div>
      <div class="wave" style="top:65%; height:50px; animation-duration:11s;"></div>
    </div>
    <div id="topbar">
      <div class="pill"><span>🪙</span><span id="coinsVal">0</span></div>
      <div id="levelbox">
        <div class="lvltop"><span id="lvlVal">Ур. 1</span><span id="xpText">0/100</span></div>
        <div class="xpbar"><div class="xpfill" id="xpfill"></div></div>
      </div>
      <div class="pill"><span>🐟</span><span id="catchVal">0</span></div>
    </div>
    <div class="title"><h1 id="locTitle">Тихая Гавань</h1></div>
    <div id="locrow"></div>
    <div id="bonusbanner">🎁 <span id="bonusText">Бонус готов!</span><button id="bonusBtn">Забрать</button></div>

    <div id="rodwrap"><div id="line"></div></div>
    <div id="bobber" class="hidden"><div class="body"></div></div>
    <div id="splash"></div>
    <div id="bitebang">💥</div>

    <div id="bottompanel">
      <div id="status">Готов начать</div>
      <div id="timerbar"><div id="timerfill"></div></div>
      <button id="mainbtn">Закинуть удочку</button>
      <div id="gearline"></div>
    </div>

    <div id="catchcard">
      <div class="card">
        <span class="fishico" id="cc-ico">🐠</span>
        <h2 id="cc-name">Окунь</h2>
        <div class="rarity" id="cc-rarity">обычная</div>
        <div class="xpline" id="cc-xp">+5 опыта</div>
        <div class="hint">Продай в разделе «Рынок»</div>
        <button id="cc-close">Отлично!</button>
      </div>
    </div>
  </div>

  <div class="subscreen" id="screen-shop">
    <div class="subhead"><h2>Магазин</h2><p>Снаряжение для рыбалки</p></div>
    <div class="sublist" id="shoplist"></div>
  </div>

  <div class="subscreen" id="screen-market">
    <div class="subhead"><h2>Рынок</h2><p>Продай улов или обменяй на редкую рыбу</p></div>
    <button id="sellall">Продать весь улов</button>
    <div class="sublist" id="marketlist"></div>
  </div>

  <div class="subscreen" id="screen-collection">
    <div class="subhead"><h2>Коллекция</h2><p id="collSummary">Открыто 0 из 0 видов</p></div>
    <div class="sublist" id="colllist"></div>
  </div>

  <div class="subscreen" id="screen-top">
    <div class="subhead"><h2>Топ рыбаков</h2><p>Рейтинг по общему опыту</p></div>
    <div class="sublist" id="toplist"></div>
  </div>

  <div id="navbar">
    <button class="navbtn active" data-screen="fish"><span class="navico">🎣</span>Рыбалка</button>
    <button class="navbtn" data-screen="shop"><span class="navico">🛒</span>Магазин</button>
    <button class="navbtn" data-screen="market"><span class="navico">💰</span>Рынок</button>
    <button class="navbtn" data-screen="collection"><span class="navico">📖</span>Коллекция</button>
    <button class="navbtn" data-screen="top"><span class="navico">🏆</span>Топ</button>
  </div>
</div>

<script>
(function(){
  const tg = window.Telegram && window.Telegram.WebApp;
  if(tg){ try{ tg.ready(); tg.expand(); tg.setHeaderColor && tg.setHeaderColor('#0B2F3A'); tg.setBackgroundColor && tg.setBackgroundColor('#0B2F3A'); }catch(e){} }
  function haptic(type){
    if(tg && tg.HapticFeedback){
      if(type==='success') tg.HapticFeedback.notificationOccurred('success');
      else if(type==='error') tg.HapticFeedback.notificationOccurred('error');
      else tg.HapticFeedback.impactOccurred('light');
    }
  }

  // ====== ЗАПОЛНИ ЭТУ СТРОКУ ПОСЛЕ НАСТРОЙКИ FIREBASE (см. инструкцию в чате) ======
  const FIREBASE_URL = "ВСТАВЬ-СВОЙ-URL-СЮДА";
  // Пример: "https://tihaya-gavan-default-rtdb.europe-west1.firebasedatabase.app"
  // =================================================================================

  const RARITY_LABEL = ['обычная','обычная','редкая','ценная','легендарная'];
  const RARITY_SPEED = [1, 1, 0.8, 0.6, 0.42]; // множитель окна поклёва: чем реже рыба, тем короче окно

  const LOCATIONS = [
    { id:'harbor', name:'Тихая Гавань', unlockLevel:1, top:'#F2A65A', bottom:'#1E5A6B',
      fish:[
        {id:'roach', name:'Плотвичка', ico:'🐟', tier:0, coins:[5,10], xp:5},
        {id:'perch', name:'Окунь', ico:'🐠', tier:1, coins:[8,14], xp:6},
        {id:'crucian', name:'Карась', ico:'🐡', tier:2, coins:[15,25], xp:12},
        {id:'pike', name:'Щука', ico:'🦈', tier:3, coins:[30,50], xp:25},
        {id:'golden', name:'Золотая рыбка', ico:'✨', tier:4, coins:[80,120], xp:60},
      ]},
    { id:'reef', name:'Морской Риф', unlockLevel:5, top:'#4FB3BF', bottom:'#0E3B4A',
      fish:[
        {id:'herring', name:'Сельдь', ico:'🐟', tier:0, coins:[8,15], xp:8},
        {id:'mackerel', name:'Скумбрия', ico:'🐠', tier:1, coins:[12,20], xp:9},
        {id:'crab', name:'Краб', ico:'🦀', tier:2, coins:[25,40], xp:18},
        {id:'tuna', name:'Тунец', ico:'🐡', tier:3, coins:[50,80], xp:35},
        {id:'octopus', name:'Редкий осьминог', ico:'🐙', tier:4, coins:[130,200], xp:85},
      ]},
    { id:'ice', name:'Ледяное Озеро', unlockLevel:10, top:'#BFE8F2', bottom:'#123244',
      fish:[
        {id:'icebass', name:'Ледяной окунь', ico:'🧊', tier:0, coins:[15,25], xp:12},
        {id:'trout', name:'Форель', ico:'🐟', tier:1, coins:[20,32], xp:14},
        {id:'whitefish', name:'Голубой сиг', ico:'🐠', tier:2, coins:[45,70], xp:26},
        {id:'polarpike', name:'Полярная щука', ico:'🦈', tier:3, coins:[90,140], xp:50},
        {id:'dragonfish', name:'Снежный дракон', ico:'🐉', tier:4, coins:[220,320], xp:120},
      ]},
  ];

  const RODS = [
    {id:'bamboo', name:'Бамбуковая удочка', ico:'🎣', desc:'Базовое окно поклёва 700 мс', window:700, price:0},
    {id:'carbon', name:'Карбоновая удочка', ico:'🪝', desc:'Окно поклёва 950 мс', window:950, price:400},
    {id:'titan', name:'Титановая удочка', ico:'⚙️', desc:'Окно поклёва 1300 мс', window:1300, price:1500},
  ];
  const BAITS = [
    {id:'plain', name:'Обычная наживка', ico:'🪱', desc:'Стандартные шансы улова', weights:[40,30,18,9,3], price:0},
    {id:'aroma', name:'Ароматная наживка', ico:'🌿', desc:'Больше редкой и ценной рыбы', weights:[30,25,25,15,5], price:250},
    {id:'magic', name:'Магическая наживка', ico:'🔮', desc:'Сильно больше шанс легендарной', weights:[20,20,25,20,15], price:1200},
  ];

  function xpNeeded(level){ return level*100; }
  function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
  function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }

  let state = {
    coins:0, totalCatches:0, level:1, xp:0, totalXpEarned:0,
    ownedRods:['bamboo'], activeRod:'bamboo', ownedBaits:['plain'], activeBait:'plain',
    currentLocation:'harbor', inventory:{}, collectionTotal:{},
    lastBonusDate:null, dailyStreak:0, anonId:null
  };

  const SAVE_KEY = 'save_v2';
  let saveTimer=null;
  function saveState(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      const payload = JSON.stringify(state);
      if(tg && tg.CloudStorage){ tg.CloudStorage.setItem(SAVE_KEY, payload, function(){}); }
      window.__memSave = payload;
      syncLeaderboard();
    }, 300);
  }
  function loadState(cb){
    if(tg && tg.CloudStorage){
      tg.CloudStorage.getItem(SAVE_KEY, function(err, value){
        if(!err && value){ try{ Object.assign(state, JSON.parse(value)); }catch(e){} }
        cb();
      });
    } else {
      if(window.__memSave){ try{ Object.assign(state, JSON.parse(window.__memSave)); }catch(e){} }
      cb();
    }
  }

  function getRod(id){ return RODS.find(r=>r.id===id); }
  function getBait(id){ return BAITS.find(b=>b.id===id); }
  function getLocation(id){ return LOCATIONS.find(l=>l.id===id); }
  function currentLoc(){ return getLocation(state.currentLocation); }
  function isLocUnlocked(loc){ return state.level >= loc.unlockLevel; }

  function pickFish(){
    const weights = getBait(state.activeBait).weights;
    const total = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    const list = currentLoc().fish;
    for(let i=0;i<weights.length;i++){ if(r<weights[i]) return list[i]; r-=weights[i]; }
    return list[0];
  }

  function addXp(amount){
    state.xp += amount; state.totalXpEarned += amount;
    while(state.xp >= xpNeeded(state.level)){ state.xp -= xpNeeded(state.level); state.level += 1; }
  }

  function getUserId(){
    if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) return 'u'+tg.initDataUnsafe.user.id;
    if(!state.anonId) state.anonId = 'anon'+Math.random().toString(36).slice(2,10);
    return state.anonId;
  }
  function getUserName(){
    if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) return tg.initDataUnsafe.user.first_name;
    return 'Рыбак';
  }
  function fbReady(){ return FIREBASE_URL && FIREBASE_URL.indexOf('ВСТАВЬ') === -1; }
  function syncLeaderboard(){
    if(!fbReady()) return;
    const uid = getUserId();
    fetch(FIREBASE_URL + '/leaderboard/' + uid + '.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name:getUserName(), level:state.level, score:state.totalXpEarned })
    }).catch(()=>{});
  }

  // ---------- UI REFS ----------
  const btn=document.getElementById('mainbtn'), status=document.getElementById('status'),
    bobber=document.getElementById('bobber'), splash=document.getElementById('splash'),
    biteBang=document.getElementById('bitebang'), timerbar=document.getElementById('timerbar'),
    timerfill=document.getElementById('timerfill'), coinsVal=document.getElementById('coinsVal'),
    catchVal=document.getElementById('catchVal'), catchcard=document.getElementById('catchcard'),
    lvlVal=document.getElementById('lvlVal'), xpText=document.getElementById('xpText'),
    xpfill=document.getElementById('xpfill'), gearline=document.getElementById('gearline'),
    stageEl=document.getElementById('screen-fish'), locTitle=document.getElementById('locTitle'),
    locrow=document.getElementById('locrow'), bonusbanner=document.getElementById('bonusbanner');

  let gameState='idle', biteTimeout, windowTimeout, currentFish=null;

  function refreshTopUI(){
    coinsVal.textContent = state.coins;
    catchVal.textContent = state.totalCatches;
    lvlVal.textContent = 'Ур. ' + state.level;
    xpText.textContent = state.xp + '/' + xpNeeded(state.level);
    xpfill.style.width = Math.min(100, (state.xp/xpNeeded(state.level))*100) + '%';
    gearline.textContent = getRod(state.activeRod).name + ' · ' + getBait(state.activeBait).name;
    locTitle.textContent = currentLoc().name;
    stageEl.style.background = `linear-gradient(to bottom, ${currentLoc().top} 0%, ${currentLoc().bottom} 32%, ${currentLoc().bottom} 33%, var(--water-deep) 100%)`;
    renderLocRow();
    refreshBonusBanner();
  }

  function renderLocRow(){
    locrow.innerHTML = '';
    LOCATIONS.forEach(loc=>{
      const unlocked = isLocUnlocked(loc);
      const p = document.createElement('div');
      p.className = 'locpill' + (loc.id===state.currentLocation?' active':'') + (!unlocked?' locked':'');
      p.textContent = unlocked ? loc.name : ('🔒 ур.' + loc.unlockLevel);
      if(unlocked) p.addEventListener('click', ()=>{ state.currentLocation = loc.id; saveState(); refreshTopUI(); });
      locrow.appendChild(p);
    });
  }

  function refreshBonusBanner(){
    const today = todayStr();
    if(state.lastBonusDate !== today){
      const reward = 50 + Math.min(state.dailyStreak,10)*15;
      document.getElementById('bonusText').textContent = 'Бонус за вход! +' + reward + ' 🪙';
      bonusbanner.classList.add('show');
      bonusbanner.dataset.reward = reward;
    } else {
      bonusbanner.classList.remove('show');
    }
  }
  document.getElementById('bonusBtn').addEventListener('click', ()=>{
    const today = todayStr(), yest = yesterdayStr();
    state.dailyStreak = (state.lastBonusDate === yest) ? state.dailyStreak+1 : 1;
    const reward = 50 + Math.min(state.dailyStreak-1,10)*15;
    state.coins += reward; state.lastBonusDate = today;
    haptic('success'); saveState(); refreshTopUI();
  });

  function resetVisual(){
    bobber.classList.add('hidden'); btn.classList.remove('pull'); btn.disabled=false;
    timerbar.style.display='none'; status.textContent='Готов начать'; btn.textContent='Закинуть удочку';
  }

  function cast(){
    if(gameState!=='idle') return;
    gameState='casting'; btn.disabled=true; status.textContent='Закидываем...'; haptic('light');
    const cx = stageEl.clientWidth/2, cy = window.innerHeight*0.30 + 50 + Math.random()*35;
    bobber.style.left=cx+'px'; bobber.style.top=cy+'px'; bobber.classList.remove('hidden');
    setTimeout(()=>{
      gameState='waiting'; status.textContent='Тихо... жди клёва'; btn.disabled=true;
      const delay = 1400 + Math.random()*2600;
      biteTimeout = setTimeout(triggerBite, delay);
    }, 350);
  }

  function triggerBite(){
    if(gameState!=='waiting') return;
    gameState='biting'; currentFish=pickFish(); haptic('light');
    const rect = bobber.getBoundingClientRect();
    splash.style.left=rect.left+rect.width/2+'px'; splash.style.top=rect.top+rect.height/2+'px';
    splash.classList.remove('animate'); void splash.offsetWidth; splash.classList.add('animate');
    biteBang.style.left=rect.left+rect.width/2+'px'; biteBang.style.top=rect.top+'px';
    biteBang.classList.remove('show'); void biteBang.offsetWidth; biteBang.classList.add('show');
    status.textContent='КЛЮЁТ! Тяни!'; btn.textContent='Тяни!'; btn.classList.add('pull'); btn.disabled=false;
    const winMs = Math.round(getRod(state.activeRod).window * RARITY_SPEED[currentFish.tier]);
    timerbar.style.display='block'; timerfill.style.transition='none'; timerfill.style.width='100%';
    requestAnimationFrame(()=>{ timerfill.style.transition=`width ${winMs}ms linear`; timerfill.style.width='0%'; });
    windowTimeout = setTimeout(missedBite, winMs);
  }

  function missedBite(){
    if(gameState!=='biting') return;
    gameState='idle'; haptic('error'); status.textContent='Рыба сорвалась... Попробуй снова';
    setTimeout(resetVisual, 900);
  }

  function pull(){
    if(gameState!=='biting') return;
    clearTimeout(windowTimeout); gameState='idle'; haptic('success');
    const fish = currentFish;
    state.totalCatches += 1;
    state.inventory[fish.id] = (state.inventory[fish.id]||0) + 1;
    state.collectionTotal[fish.id] = (state.collectionTotal[fish.id]||0) + 1;
    addXp(fish.xp);
    saveState(); refreshTopUI();

    document.getElementById('cc-ico').textContent = fish.ico;
    document.getElementById('cc-name').textContent = fish.name;
    const rarityEl = document.getElementById('cc-rarity');
    rarityEl.textContent = RARITY_LABEL[fish.tier]; rarityEl.className = 'rarity r' + fish.tier;
    document.getElementById('cc-xp').textContent = '+' + fish.xp + ' опыта';
    catchcard.style.display = 'flex';
    resetVisual();
  }

  btn.addEventListener('click', ()=>{ if(gameState==='idle') cast(); else if(gameState==='biting') pull(); });
  document.getElementById('cc-close').addEventListener('click', ()=>{ catchcard.style.display='none'; });

  // ---------- SHOP (gear) ----------
  function renderShop(){
    const list = document.getElementById('shoplist'); list.innerHTML = '';
    const h1 = document.createElement('div'); h1.className='sectiontitle'; h1.textContent='Удочки'; list.appendChild(h1);
    RODS.forEach(r=>list.appendChild(gearCard(r,'rod')));
    const h2 = document.createElement('div'); h2.className='sectiontitle'; h2.textContent='Наживка'; list.appendChild(h2);
    BAITS.forEach(b=>list.appendChild(gearCard(b,'bait')));
  }
  function gearCard(item, kind){
    const owned = kind==='rod' ? state.ownedRods.includes(item.id) : state.ownedBaits.includes(item.id);
    const active = kind==='rod' ? state.activeRod===item.id : state.activeBait===item.id;
    const el = document.createElement('div'); el.className='card2';
    const affordable = state.coins >= item.price;
    let label, cls, disabled=false;
    if(active){ label='Выбрано'; cls='btn-owned'; disabled=true; }
    else if(owned){ label='Выбрать'; cls='btn-active'; }
    else { label = item.price===0 ? 'Выбрать' : (item.price + ' 🪙'); cls='btn-buy'; disabled = !affordable; }
    el.innerHTML = `<div class="icobox">${item.ico}</div>
      <div class="info"><div class="name">${item.name}</div><div class="desc">${item.desc}</div></div>
      <div class="action"><button class="${cls}" ${disabled?'disabled':''}>${label}</button></div>`;
    el.querySelector('button').addEventListener('click', ()=>{
      if(active) return;
      if(!owned){ if(state.coins < item.price) return; state.coins -= item.price;
        if(kind==='rod') state.ownedRods.push(item.id); else state.ownedBaits.push(item.id); }
      if(kind==='rod') state.activeRod = item.id; else state.activeBait = item.id;
      haptic('success'); saveState(); refreshTopUI(); renderShop();
    });
    return el;
  }

  // ---------- MARKET (sell / trade) ----------
  function renderMarket(){
    const list = document.getElementById('marketlist'); list.innerHTML = '';
    const loc = currentLoc();
    let any = false;
    loc.fish.forEach((f,idx)=>{
      const count = state.inventory[f.id] || 0;
      if(count<=0) return;
      any = true;
      const sellPrice = Math.floor((f.coins[0]+f.coins[1])/2);
      const el = document.createElement('div'); el.className='card2';
      const canTrade = f.tier < 3 && count>=4;
      el.innerHTML = `<div class="icobox">${f.ico}</div>
        <div class="info"><div class="name">${f.name} ×${count}</div><div class="desc">${sellPrice} 🪙 за шт · ${RARITY_LABEL[f.tier]}</div></div>
        <div class="action">
          <button class="btn-sell" data-act="sell1">Продать 1</button>
          ${canTrade?'<button class="btn-trade" data-act="trade">Обмен 4→1</button>':''}
        </div>`;
      el.querySelector('[data-act="sell1"]').addEventListener('click', ()=>{
        state.inventory[f.id] -= 1; state.coins += sellPrice;
        haptic('success'); saveState(); refreshTopUI(); renderMarket();
      });
      const tradeBtn = el.querySelector('[data-act="trade"]');
      if(tradeBtn) tradeBtn.addEventListener('click', ()=>{
        if((state.inventory[f.id]||0) < 4) return;
        state.inventory[f.id] -= 4;
        const nextFish = loc.fish[idx+1];
        state.inventory[nextFish.id] = (state.inventory[nextFish.id]||0) + 1;
        haptic('success'); saveState(); refreshTopUI(); renderMarket();
      });
      list.appendChild(el);
    });
    if(!any){ const empty=document.createElement('div'); empty.className='lbnote'; empty.textContent='Пока нечего продавать — иди на рыбалку в разделе «Рыбалка».'; list.appendChild(empty); }
  }
  document.getElementById('sellall').addEventListener('click', ()=>{
    const loc = currentLoc(); let total = 0;
    loc.fish.forEach(f=>{
      const count = state.inventory[f.id]||0;
      if(count>0){ const price = Math.floor((f.coins[0]+f.coins[1])/2); total += price*count; state.inventory[f.id]=0; }
    });
    if(total>0){ state.coins += total; haptic('success'); saveState(); refreshTopUI(); renderMarket(); }
  });

  // ---------- COLLECTION ----------
  function renderCollection(){
    const list = document.getElementById('colllist'); list.innerHTML = '';
    let discovered=0, totalSpecies=0;
    LOCATIONS.forEach(loc=>{
      const h = document.createElement('div'); h.className='sectiontitle'; h.textContent = loc.name; list.appendChild(h);
      loc.fish.forEach(f=>{
        totalSpecies++;
        const count = state.collectionTotal[f.id] || 0;
        if(count>0) discovered++;
        const el = document.createElement('div'); el.className='card2' + (count===0?' locked':'');
        el.innerHTML = `<div class="icobox">${count>0?f.ico:'❔'}</div>
          <div class="info"><div class="name">${count>0?f.name:'???'}</div>
          <div class="desc">${count>0 ? ('Поймано: '+count+' · '+RARITY_LABEL[f.tier]) : 'Ещё не найдено'}</div></div>`;
        list.appendChild(el);
      });
    });
    document.getElementById('collSummary').textContent = `Открыто ${discovered} из ${totalSpecies} видов`;
  }

  // ---------- LEADERBOARD ----------
  function renderTop(){
    const list = document.getElementById('toplist'); list.innerHTML = '';
    if(!fbReady()){
      const note = document.createElement('div'); note.className='lbnote';
      note.textContent = 'Таблица лидеров пока не настроена. Нужно один раз подключить бесплатное облачное хранилище — инструкция у тебя в чате с Claude.';
      list.appendChild(note); return;
    }
    const loading = document.createElement('div'); loading.className='lbnote'; loading.textContent='Загрузка...'; list.appendChild(loading);
    fetch(FIREBASE_URL + '/leaderboard.json').then(r=>r.json()).then(data=>{
      list.innerHTML = '';
      if(!data){ list.innerHTML = '<div class="lbnote">Пока никто не в рейтинге. Будь первым!</div>'; return; }
      const myId = getUserId();
      const arr = Object.keys(data).map(k=>({id:k, name:data[k].name||'Рыбак', level:data[k].level||1, score:data[k].score||0}));
      arr.sort((a,b)=>b.score-a.score);
      arr.slice(0,30).forEach((row,i)=>{
        const el = document.createElement('div'); el.className='lbrow' + (row.id===myId?' me':'');
        el.innerHTML = `<div class="lbrank">${i+1}</div><div class="lbname">${row.name} · ур.${row.level}</div><div class="lbscore">${row.score}</div>`;
        list.appendChild(el);
      });
    }).catch(()=>{ list.innerHTML = '<div class="lbnote">Не удалось загрузить рейтинг. Проверь соединение.</div>'; });
  }

  // ---------- NAV ----------
  const navbtns = document.querySelectorAll('.navbtn');
  navbtns.forEach(b=>b.addEventListener('click', ()=>{
    navbtns.forEach(x=>x.classList.remove('active')); b.classList.add('active');
    ['shop','market','collection','top'].forEach(s=>document.getElementById('screen-'+s).classList.remove('show'));
    const scr = b.dataset.screen;
    if(scr==='shop'){ renderShop(); document.getElementById('screen-shop').classList.add('show'); }
    else if(scr==='market'){ renderMarket(); document.getElementById('screen-market').classList.add('show'); }
    else if(scr==='collection'){ renderCollection(); document.getElementById('screen-collection').classList.add('show'); }
    else if(scr==='top'){ renderTop(); document.getElementById('screen-top').classList.add('show'); }
  }));

  // ---------- INIT ----------
  loadState(function(){ refreshTopUI(); syncLeaderboard(); });
})();
</script>
</body>
</html>
